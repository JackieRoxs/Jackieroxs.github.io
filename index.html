<!DOCTYPE html>
<html>
<head>
    <title>Polytoria Audio Sync</title>
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .box { border: 2px solid #333; display: inline-block; padding: 30px; border-radius: 15px; background: #1a1a1a; }
        input { padding: 12px; border-radius: 5px; background: #000; color: #fff; border: 1px solid #444; width: 200px; }
        button { padding: 12px 25px; background: #ff4747; color: white; border: none; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; color: #888; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Audio Portal</h1>
        <input type="text" id="username" placeholder="Username">
        <button id="syncBtn">CONNECT</button>
        <div id="status">Ready to sync...</div>
    </div>
    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const REPLIT_URL = "https://6e8c99b5-5491-4d77-8e94-273908bbe395-00-3qqh3c3lmo5c8.kirk.replit.dev:8080";

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { height: '0', width: '0' });
        }

        document.getElementById('syncBtn').onclick = function() {
            const user = document.getElementById('username').value.trim();
            if(!user) return;
            document.getElementById('status').innerText = "Connected. Waiting for game...";
            
            setInterval(async () => {
                try {
                    const res = await fetch(`${REPLIT_URL}/get_signal?username=${user}`);
                    const data = await res.json();
                    if (data.status === "START_SONG") {
                        player.loadVideoById(data.videoId);
                        player.playVideo();
                        document.getElementById('status').innerText = "Playing!";
                    }
                } catch(e) { console.error("Sync error", e); }
            }, 1000);
        };
    </script>
</body>
</html>
